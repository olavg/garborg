<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>garborg.com</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(
        -45deg,
        #ff6b6b,
        #ffb347,
        #4ecdc4,
        #5568fe,
        #c44dff
    );
    background-size: 400% 400%;
    animation: gradientMove 15s ease infinite;
    font-family: "Segoe UI", Arial, sans-serif;
    overflow: hidden;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    text-align: center;
    padding: 40px;
    backdrop-filter: blur(18px);
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 30px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.15);
}

/* Logo */
.logo {
    width: 320px;
    max-width: 80vw;
    border-radius: 20px;
    box-shadow:
        0 0 30px rgba(255,255,255,0.4),
        0 15px 35px rgba(0,0,0,0.25);
    animation: float 5s ease-in-out infinite;
}

@keyframes float {
    0%,100% {
        transform: translateY(0px) scale(1);
    }
    50% {
        transform: translateY(-12px) scale(1.04);
    }
}

/* Main Text */
.garborg-text {
    margin-top: 35px;
    font-size: clamp(3rem, 8vw, 6rem);
    font-weight: 900;
    letter-spacing: 3px;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    user-select: none;
}

.letter {
    display: inline-block;
    animation:
        bounce 2.5s infinite ease-in-out,
        rainbow 8s infinite linear;
    text-shadow:
        0 0 15px rgba(255,255,255,0.6),
        0 0 25px rgba(255,255,255,0.3);
}

@keyframes bounce {
    0%,100% {
        transform: translateY(0);
    }
    50% {
        transform: translateY(-18px);
    }
}

@keyframes rainbow {
    0%   { color: #ff4d6d; }
    20%  { color: #ff9f1c; }
    40%  { color: #2ec4b6; }
    60%  { color: #3a86ff; }
    80%  { color: #8338ec; }
    100% { color: #ff4d6d; }
}

.letter:nth-child(1) { animation-delay: 0s; }
.letter:nth-child(2) { animation-delay: .1s; }
.letter:nth-child(3) { animation-delay: .2s; }
.letter:nth-child(4) { animation-delay: .3s; }
.letter:nth-child(5) { animation-delay: .4s; }
.letter:nth-child(6) { animation-delay: .5s; }
.letter:nth-child(7) { animation-delay: .6s; }
.letter:nth-child(8) { animation-delay: .7s; }
.letter:nth-child(9) { animation-delay: .8s; }
.letter:nth-child(10) { animation-delay: .9s; }
.letter:nth-child(11) { animation-delay: 1s; }

.version {
    margin-top: 15px;
    font-size: 0.9rem;
    color: rgba(255,255,255,0.85);
    letter-spacing: 3px;
    text-transform: uppercase;
}
</style>
</head>

<body>

<div class="container">

    <img src="IMG_6110.JPG" alt="Garborg.com Logo" class="logo">

    <div class="garborg-text">
        <span class="letter">g</span>
        <span class="letter">a</span>
        <span class="letter">r</span>
        <span class="letter">b</span>
        <span class="letter">o</span>
        <span class="letter">r</span>
        <span class="letter">g</span>
        <span class="letter">.</span>
        <span class="letter">c</span>
        <span class="letter">o</span>
        <span class="letter">m</span>
    </div>

    <div class="version">v02</div>

</div>

</body>
</html>
