<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>garborg.com</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg1: #ff6b6b;
      --bg2: #ffb347;
      --bg3: #4ecdc4;
      --bg4: #5568fe;
      --bg5: #c44dff;
      --glass: rgba(255, 255, 255, 0.16);
      --border: rgba(255, 255, 255, 0.24);
      --text: rgba(255, 255, 255, 0.96);
      --muted: rgba(255, 255, 255, 0.78);
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(-45deg, var(--bg1), var(--bg2), var(--bg3), var(--bg4), var(--bg5));
      background-size: 400% 400%;
      animation: bgMove 16s ease infinite;
      overflow-x: hidden;
    }

    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      width: min(920px, 100%);
      padding: 20px;
      text-align: center;
      border-radius: 28px;
      background: var(--glass);
      border: 1px solid var(--border);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(18px);
    }

    .logo {
      width: min(280px, 70vw);
      border-radius: 20px;
      display: block;
      margin: 0 auto;
      box-shadow:
        0 0 30px rgba(255, 255, 255, 0.35),
        0 15px 35px rgba(0, 0, 0, 0.22);
      animation: float 5s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-10px) scale(1.03); }
    }

    .game-wrap {
      margin-top: 22px;
      display: grid;
      gap: 12px;
      justify-items: center;
    }

    .hud {
      width: min(760px, 100%);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.92rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0 4px;
    }

    .score {
      font-weight: 900;
      color: white;
      font-size: 1rem;
    }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 800;
      cursor: pointer;
      background: rgba(255,255,255,0.92);
      color: #1d2340;
      box-shadow: 0 10px 24px rgba(0,0,0,0.15);
    }

    canvas {
      width: min(760px, 100%);
      aspect-ratio: 2 / 1;
      display: block;
      border-radius: 20px;
      background:
        radial-gradient(circle at 50% 30%, rgba(255,255,255,0.16), rgba(255,255,255,0.04) 40%, rgba(0,0,0,0.12) 100%);
      border: 1px solid rgba(255,255,255,0.24);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.08),
        0 18px 40px rgba(0,0,0,0.18);
      touch-action: none;
    }

    .help {
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.4;
      max-width: 720px;
    }

    .version {
      margin-top: 16px;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.82);
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    @media (max-width: 720px) {
      .container {
        padding: 16px;
        border-radius: 24px;
      }

      .hud {
        font-size: 0.78rem;
      }

      .help {
        font-size: 0.82rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="IMG_6110.JPG" alt="Garborg.com Logo" class="logo" />

    <div class="game-wrap">
      <div class="hud">
        <div>Tap / click bubbles</div>
        <div class="score" id="score">0</div>
        <button class="btn" id="restartBtn">Restart</button>
      </div>

      <canvas id="game"></canvas>

      <div class="help" id="helpText">
        Pop as many bubbles as you can in 30 seconds. Golden bubbles are worth more points.
      </div>
    </div>

    <div class="version" id="version">v03</div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const helpText = document.getElementById("helpText");
    const restartBtn = document.getElementById("restartBtn");

    let cssW = 760;
    let cssH = 380;
    let dpr = window.devicePixelRatio || 1;

    const game = {
      score: 0,
      timeLeft: 30,
      running: false,
      gameOver: false,
      bubbles: [],
      lastSpawn: 0,
      lastTime: 0,
      burstText: null
    };

    const palette = [
      "#ff4d6d",
      "#ff9f1c",
      "#2ec4b6",
      "#3a86ff",
      "#8338ec",
      "#f72585",
      "#06d6a0"
    ];

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      cssW = rect.width;
      cssH = rect.height;
      dpr = window.devicePixelRatio || 1;

      canvas.width = Math.round(cssW * dpr);
      canvas.height = Math.round(cssH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function resetGame() {
      game.score = 0;
      game.timeLeft = 30;
      game.running = true;
      game.gameOver = false;
      game.bubbles = [];
      game.lastSpawn = 0;
      game.burstText = null;
      scoreEl.textContent = "0";
      helpText.textContent = "Pop as many bubbles as you can in 30 seconds. Golden bubbles are worth more points.";
      spawnBurst(10);
    }

    function spawnBubble() {
      const size = 18 + Math.random() * 34;
      const golden = Math.random() < 0.08;

      const bubble = {
        x: size + Math.random() * Math.max(80, cssW - size * 2 - 80),
        y: cssH + size + Math.random() * 30,
        vx: (Math.random() - 0.5) * 0.8,
        vy: -(0.7 + Math.random() * 1.8),
        r: size,
        hue: golden ? 48 : palette[Math.floor(Math.random() * palette.length)],
        alpha: 0.92,
        pop: 0,
        wobble: Math.random() * Math.PI * 2,
        golden
      };

      game.bubbles.push(bubble);
    }

    function spawnBurst(count = 6) {
      for (let i = 0; i < count; i++) {
        setTimeout(spawnBubble, i * 90);
      }
    }

    function bubblePoints(b) {
      return b.golden ? 5 : 1;
    }

    function popBubble(index, x, y) {
      const b = game.bubbles[index];
      if (!b) return;

      game.score += bubblePoints(b);
      scoreEl.textContent = String(game.score);

      game.burstText = {
        x,
        y,
        text: b.golden ? "+5" : "+1",
        life: 1
      };

      game.bubbles.splice(index, 1);
    }

    function pointerToCanvas(e) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (e.clientX - rect.left),
        y: (e.clientY - rect.top)
      };
    }

    function hitTestBubble(px, py, b) {
      const dx = px - b.x;
      const dy = py - b.y;
      return Math.sqrt(dx * dx + dy * dy) <= b.r;
    }

    function onPointerDown(e) {
      const p = pointerToCanvas(e);

      if (game.gameOver) {
        resetGame();
        return;
      }

      let hit = false;
      for (let i = game.bubbles.length - 1; i >= 0; i--) {
        if (hitTestBubble(p.x, p.y, game.bubbles[i])) {
          popBubble(i, game.bubbles[i].x, game.bubbles[i].y);
          hit = true;
          break;
        }
      }

      if (!hit && !game.running) resetGame();
    }

    canvas.addEventListener("pointerdown", onPointerDown);

    restartBtn.addEventListener("click", resetGame);

    window.addEventListener("resize", () => {
      resizeCanvas();
    });

    function drawBackground() {
      const g = ctx.createLinearGradient(0, 0, cssW, cssH);
      g.addColorStop(0, "rgba(255,255,255,0.08)");
      g.addColorStop(0.5, "rgba(255,255,255,0.02)");
      g.addColorStop(1, "rgba(255,255,255,0.06)");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, cssW, cssH);
    }

    function drawBubble(b) {
      ctx.save();

      const grad = ctx.createRadialGradient(
        b.x - b.r * 0.3,
        b.y - b.r * 0.3,
        b.r * 0.1,
        b.x,
        b.y,
        b.r
      );

      if (b.golden) {
        grad.addColorStop(0, "rgba(255,255,255,0.98)");
        grad.addColorStop(0.35, "rgba(255,232,150,0.92)");
        grad.addColorStop(1, "rgba(255,183,0,0.18)");
      } else {
        grad.addColorStop(0, "rgba(255,255,255,0.92)");
        grad.addColorStop(0.2, b.hue);
        grad.addColorStop(1, "rgba(255,255,255,0.12)");
      }

      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.shadowColor = b.golden ? "rgba(255,230,130,0.6)" : "rgba(255,255,255,0.35)";
      ctx.shadowBlur = b.golden ? 22 : 16;
      ctx.fill();

      ctx.lineWidth = 2;
      ctx.strokeStyle = "rgba(255,255,255,0.55)";
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(b.x - b.r * 0.3, b.y - b.r * 0.32, b.r * 0.18, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,255,255,0.65)";
      ctx.fill();

      ctx.restore();
    }

    function drawBurstText() {
      if (!game.burstText) return;

      const t = game.burstText;
      ctx.save();
      ctx.globalAlpha = clamp(t.life, 0, 1);
      ctx.fillStyle = "#fff";
      ctx.font = "900 26px Segoe UI, Arial, sans-serif";
      ctx.textAlign = "center";
      ctx.shadowColor = "rgba(255,255,255,0.6)";
      ctx.shadowBlur = 12;
      ctx.fillText(t.text, t.x, t.y - (1 - t.life) * 24);
      ctx.restore();
    }

    function drawHUDOverlay() {
      if (!game.running && !game.gameOver) return;

      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,0.25)";
      ctx.fillRect(0, 0, cssW, cssH);

      ctx.fillStyle = "#fff";
      ctx.textAlign = "center";

      if (game.gameOver) {
        ctx.font = "900 34px Segoe UI, Arial, sans-serif";
        ctx.fillText("Time!", cssW / 2, cssH / 2 - 16);

        ctx.font = "700 18px Segoe UI, Arial, sans-serif";
        ctx.fillText(`Final score: ${game.score}`, cssW / 2, cssH / 2 + 16);
        ctx.fillText("Tap to play again", cssW / 2, cssH / 2 + 42);
      }
      ctx.restore();
    }

    function update(dt) {
      if (!game.running || game.gameOver) return;

      game.timeLeft -= dt;
      if (game.timeLeft <= 0) {
        game.timeLeft = 0;
        game.running = false;
        game.gameOver = true;
        helpText.textContent = "Nice! Tap Restart or the canvas to try again.";
      }

      const spawnRate = Math.max(420, 920 - game.score * 10);

      if (performance.now() - game.lastSpawn > spawnRate) {
        game.lastSpawn = performance.now();
        spawnBubble();
        if (Math.random() < 0.25) spawnBubble();
      }

      for (let i = game.bubbles.length - 1; i >= 0; i--) {
        const b = game.bubbles[i];
        b.wobble += dt * 6.5;
        b.x += b.vx + Math.sin(b.wobble) * 0.25;
        b.y += b.vy;
        b.alpha = clamp(b.alpha - dt * 0.01, 0.6, 1);

        if (b.y + b.r < -30) {
          game.bubbles.splice(i, 1);
        }
      }

      if (game.burstText) {
        game.burstText.life -= dt * 1.8;
        if (game.burstText.life <= 0) game.burstText = null;
      }
    }

    function render() {
      ctx.clearRect(0, 0, cssW, cssH);
      drawBackground();

      // soft floating dots in the background
      ctx.save();
      for (let i = 0; i < 14; i++) {
        const x = (i * 67 + (performance.now() * 0.01)) % cssW;
        const y = (i * 31 + (performance.now() * 0.015)) % cssH;
        ctx.fillStyle = "rgba(255,255,255,0.05)";
        ctx.beginPath();
        ctx.arc(x, y, 2 + (i % 3), 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();

      for (const b of game.bubbles) drawBubble(b);
      drawBurstText();
      drawHUDOverlay();
    }

    function loop(now) {
      if (!game.lastTime) game.lastTime = now;
      const dt = Math.min(0.032, (now - game.lastTime) / 1000);
      game.lastTime = now;

      update(dt);
      render();

      if (game.running || !game.gameOver) {
        requestAnimationFrame(loop);
      } else {
        requestAnimationFrame(loop);
      }
    }

    function tickTimer() {
      if (game.gameOver) {
        scoreEl.textContent = String(game.score);
        return;
      }
      scoreEl.textContent = String(game.score) + "  ·  " + Math.ceil(game.timeLeft) + "s";
      requestAnimationFrame(tickTimer);
    }

    resizeCanvas();
    resetGame();
    requestAnimationFrame(loop);
    requestAnimationFrame(tickTimer);
  </script>
</body>
</html>
