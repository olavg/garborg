<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>garborg.com</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg1: #ff6b6b;
      --bg2: #ffb347;
      --bg3: #4ecdc4;
      --bg4: #5568fe;
      --bg5: #c44dff;
      --glass: rgba(255, 255, 255, 0.16);
      --border: rgba(255, 255, 255, 0.24);
      --text: rgba(255, 255, 255, 0.96);
      --muted: rgba(255, 255, 255, 0.78);
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(-45deg, var(--bg1), var(--bg2), var(--bg3), var(--bg4), var(--bg5));
      background-size: 400% 400%;
      animation: bgMove 16s ease infinite;
      overflow-x: hidden;
    }

    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      width: min(920px, 100%);
      padding: 20px;
      text-align: center;
      border-radius: 28px;
      background: var(--glass);
      border: 1px solid var(--border);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(18px);
    }

    .logo {
      width: min(280px, 70vw);
      border-radius: 20px;
      display: block;
      margin: 0 auto;
      box-shadow:
        0 0 30px rgba(255, 255, 255, 0.35),
        0 15px 35px rgba(0, 0, 0, 0.22);
      animation: float 5s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-10px) scale(1.03); }
    }

    .garborg-text {
      margin-top: 18px;
      font-size: clamp(2.4rem, 7vw, 5.2rem);
      font-weight: 900;
      letter-spacing: 3px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      user-select: none;
      line-height: 1;
    }

    .letter {
      display: inline-block;
      animation:
        bounce 2.5s infinite ease-in-out,
        rainbow 8s infinite linear;
      text-shadow:
        0 0 14px rgba(255, 255, 255, 0.55),
        0 0 26px rgba(255, 255, 255, 0.22);
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-16px); }
    }

    @keyframes rainbow {
      0%   { color: #ff4d6d; }
      20%  { color: #ff9f1c; }
      40%  { color: #2ec4b6; }
      60%  { color: #3a86ff; }
      80%  { color: #8338ec; }
      100% { color: #ff4d6d; }
    }

    .letter:nth-child(1) { animation-delay: 0s; }
    .letter:nth-child(2) { animation-delay: .1s; }
    .letter:nth-child(3) { animation-delay: .2s; }
    .letter:nth-child(4) { animation-delay: .3s; }
    .letter:nth-child(5) { animation-delay: .4s; }
    .letter:nth-child(6) { animation-delay: .5s; }
    .letter:nth-child(7) { animation-delay: .6s; }
    .letter:nth-child(8) { animation-delay: .7s; }
    .letter:nth-child(9) { animation-delay: .8s; }
    .letter:nth-child(10) { animation-delay: .9s; }
    .letter:nth-child(11) { animation-delay: 1s; }

    .game-wrap {
      margin-top: 22px;
      display: grid;
      gap: 12px;
      justify-items: center;
    }

    .hud {
      width: min(760px, 100%);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.92rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0 4px;
    }

    .score {
      font-weight: 900;
      color: white;
      font-size: 1rem;
    }

    canvas {
      width: min(760px, 100%);
      aspect-ratio: 2 / 1;
      display: block;
      border-radius: 20px;
      background:
        radial-gradient(circle at 50% 30%, rgba(255,255,255,0.16), rgba(255,255,255,0.04) 40%, rgba(0,0,0,0.12) 100%);
      border: 1px solid rgba(255,255,255,0.24);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.08),
        0 18px 40px rgba(0,0,0,0.18);
      touch-action: none;
    }

    .help {
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.4;
      max-width: 720px;
    }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 800;
      cursor: pointer;
      background: rgba(255,255,255,0.92);
      color: #1d2340;
      box-shadow: 0 10px 24px rgba(0,0,0,0.15);
    }

    .version {
      margin-top: 16px;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.82);
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    @media (max-width: 720px) {
      .container {
        padding: 16px;
        border-radius: 24px;
      }

      .hud {
        font-size: 0.78rem;
      }

      .help {
        font-size: 0.82rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="IMG_6110.JPG" alt="Garborg.com Logo" class="logo" />

    <div class="garborg-text" id="siteName" aria-label="garborg.com"></div>

    <div class="game-wrap">
      <div class="hud">
        <div>Drag / swipe to move</div>
        <div class="score" id="score">0 - 0</div>
        <button class="btn" id="restartBtn">Restart</button>
      </div>

      <canvas id="pong"></canvas>

      <div class="help">
        Single-player Pong for phones and desktop. Drag your paddle on the left. The right paddle is controlled by AI. First to 7 wins.
      </div>
    </div>

    <div class="version" id="version">v02</div>
  </div>

  <script>
    // Domain-aware site text
    const hostname = window.location.hostname.toLowerCase().replace(/^www\./, "") || "garborg.com";
    const siteName = document.getElementById("siteName");
    hostname.split("").forEach((ch, i) => {
      const s = document.createElement("span");
      s.className = "letter";
      s.textContent = ch;
      s.style.animationDelay = `${i * 0.1}s`;
      siteName.appendChild(s);
    });

    // Pong game
    const canvas = document.getElementById("pong");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const restartBtn = document.getElementById("restartBtn");

    let cssW = 760;
    let cssH = 380;
    let dpr = window.devicePixelRatio || 1;

    const game = {
      leftScore: 0,
      rightScore: 0,
      paused: false,
      gameOver: false,
      winner: ""
    };

    const paddle = {
      w: 14,
      h: 88,
      speed: 6.5
    };

    const left = { x: 24, y: 100 };
    const right = { x: 0, y: 100 };

    const ball = {
      x: 0,
      y: 0,
      r: 9,
      dx: 5,
      dy: 3
    };

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      cssW = rect.width;
      cssH = rect.height;
      dpr = window.devicePixelRatio || 1;

      canvas.width = Math.round(cssW * dpr);
      canvas.height = Math.round(cssH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      right.x = cssW - 24 - paddle.w;

      if (ball.x === 0 && ball.y === 0) {
        resetPositions();
      } else {
        left.y = clamp(left.y, 0, cssH - paddle.h);
        right.y = clamp(right.y, 0, cssH - paddle.h);
        ball.x = clamp(ball.x, ball.r, cssW - ball.r);
        ball.y = clamp(ball.y, ball.r, cssH - ball.r);
      }
    }

    function resetPositions(direction = 1) {
      left.y = cssH / 2 - paddle.h / 2;
      right.y = cssH / 2 - paddle.h / 2;
      ball.x = cssW / 2;
      ball.y = cssH / 2;
      ball.dx = 5 * direction;
      ball.dy = (Math.random() > 0.5 ? 1 : -1) * (2.5 + Math.random() * 1.6);
    }

    function resetGame() {
      game.leftScore = 0;
      game.rightScore = 0;
      game.paused = false;
      game.gameOver = false;
      game.winner = "";
      resetPositions(Math.random() > 0.5 ? 1 : -1);
      updateScore();
    }

    function updateScore() {
      scoreEl.textContent = `${game.leftScore} - ${game.rightScore}`;
    }

    function drawRoundedRect(x, y, w, h, r, fillStyle) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
      ctx.fillStyle = fillStyle;
      ctx.fill();
    }

    function drawCenterLine() {
      ctx.save();
      ctx.strokeStyle = "rgba(255,255,255,0.32)";
      ctx.setLineDash([10, 14]);
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(cssW / 2, 16);
      ctx.lineTo(cssW / 2, cssH - 16);
      ctx.stroke();
      ctx.restore();
    }

    function drawPaddle(p) {
      ctx.save();
      ctx.shadowColor = "rgba(255,255,255,0.4)";
      ctx.shadowBlur = 12;
      drawRoundedRect(p.x, p.y, paddle.w, paddle.h, 8, "rgba(255,255,255,0.95)");
      ctx.restore();
    }

    function drawBall() {
      ctx.save();
      const grad = ctx.createRadialGradient(ball.x - 3, ball.y - 3, 2, ball.x, ball.y, ball.r + 8);
      grad.addColorStop(0, "#ffffff");
      grad.addColorStop(0.45, "#ffecb3");
      grad.addColorStop(1, "rgba(255,255,255,0.15)");

      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.shadowColor = "rgba(255,255,255,0.6)";
      ctx.shadowBlur = 18;
      ctx.fill();
      ctx.restore();
    }

    function drawOverlay() {
      if (!game.paused && !game.gameOver) return;

      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,0.28)";
      ctx.fillRect(0, 0, cssW, cssH);

      ctx.fillStyle = "#fff";
      ctx.textAlign = "center";
      ctx.font = "900 32px Segoe UI, Arial, sans-serif";
      ctx.fillText(game.gameOver ? `${game.winner} wins!` : "Paused", cssW / 2, cssH / 2 - 10);

      ctx.font = "600 18px Segoe UI, Arial, sans-serif";
      ctx.fillText(game.gameOver ? "Tap Restart" : "Tap to continue", cssW / 2, cssH / 2 + 24);
      ctx.restore();
    }

    function serveAfterPoint(scoredBy) {
      resetPositions(scoredBy === "left" ? 1 : -1);
      game.paused = true;
      setTimeout(() => {
        if (!game.gameOver) game.paused = false;
      }, 650);
    }

    function update() {
      if (game.paused || game.gameOver) return;

      // AI paddle follows the ball with limited speed
      const aiTarget = ball.y - paddle.h / 2;
      const aiMax = 4.9;
      const delta = aiTarget - right.y;
      right.y += clamp(delta * 0.09, -aiMax, aiMax);
      right.y = clamp(right.y, 0, cssH - paddle.h);

      ball.x += ball.dx;
      ball.y += ball.dy;

      // Wall bounce
      if (ball.y - ball.r <= 0 || ball.y + ball.r >= cssH) {
        ball.dy *= -1;
        ball.y = clamp(ball.y, ball.r, cssH - ball.r);
      }

      // Left paddle collision
      if (
        ball.x - ball.r <= left.x + paddle.w &&
        ball.x - ball.r >= left.x &&
        ball.y >= left.y &&
        ball.y <= left.y + paddle.h &&
        ball.dx < 0
      ) {
        ball.dx *= -1.06;
        const hitPos = (ball.y - (left.y + paddle.h / 2)) / (paddle.h / 2);
        ball.dy = hitPos * 5.5;
        ball.x = left.x + paddle.w + ball.r;
      }

      // Right paddle collision
      if (
        ball.x + ball.r >= right.x &&
        ball.x + ball.r <= right.x + paddle.w &&
        ball.y >= right.y &&
        ball.y <= right.y + paddle.h &&
        ball.dx > 0
      ) {
        ball.dx *= -1.06;
        const hitPos = (ball.y - (right.y + paddle.h / 2)) / (paddle.h / 2);
        ball.dy = hitPos * 5.2;
        ball.x = right.x - ball.r;
      }

      // Score left / right
      if (ball.x < -30) {
        game.rightScore += 1;
        updateScore();
        if (game.rightScore >= 7) {
          game.gameOver = true;
          game.winner = "Computer";
        } else {
          serveAfterPoint("right");
        }
      }

      if (ball.x > cssW + 30) {
        game.leftScore += 1;
        updateScore();
        if (game.leftScore >= 7) {
          game.gameOver = true;
          game.winner = "You";
        } else {
          serveAfterPoint("left");
        }
      }
    }

    function render() {
      ctx.clearRect(0, 0, cssW, cssH);

      const bg = ctx.createLinearGradient(0, 0, cssW, cssH);
      bg.addColorStop(0, "rgba(255,255,255,0.08)");
      bg.addColorStop(0.5, "rgba(255,255,255,0.02)");
      bg.addColorStop(1, "rgba(255,255,255,0.06)");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, cssW, cssH);

      drawCenterLine();
      drawPaddle(left);
      drawPaddle(right);
      drawBall();
      drawOverlay();
    }

    function loop() {
      update();
      render();
      requestAnimationFrame(loop);
    }

    function movePlayerTo(clientY) {
      const rect = canvas.getBoundingClientRect();
      const y = clientY - rect.top;
      left.y = clamp(y - paddle.h / 2, 0, cssH - paddle.h);
    }

    let dragging = false;

    canvas.addEventListener("pointerdown", (e) => {
      dragging = true;
      canvas.setPointerCapture(e.pointerId);
      movePlayerTo(e.clientY);

      if (game.gameOver) {
        resetGame();
      } else if (game.paused) {
        game.paused = false;
      }
    });

    canvas.addEventListener("pointermove", (e) => {
      if (!dragging) return;
      movePlayerTo(e.clientY);
    });

    canvas.addEventListener("pointerup", () => {
      dragging = false;
    });

    canvas.addEventListener("pointercancel", () => {
      dragging = false;
    });

    // Optional keyboard controls for desktop
    window.addEventListener("keydown", (e) => {
      if (e.key === " ") {
        e.preventDefault();
        if (game.gameOver) resetGame();
        else game.paused = !game.paused;
      }
      if (e.key === "ArrowUp") left.y -= paddle.speed * 10;
      if (e.key === "ArrowDown") left.y += paddle.speed * 10;
      left.y = clamp(left.y, 0, cssH - paddle.h);
    });

    restartBtn.addEventListener("click", resetGame);
    window.addEventListener("resize", resizeCanvas);

    // Initial setup
    resizeCanvas();
    resetGame();
    loop();
  </script>
</body>
</html>
